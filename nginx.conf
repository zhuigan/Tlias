# Tlias 员工管理系统 - Nginx 配置示例
# 这个配置文件演示如何使用 Nginx 作为反向代理

# 注意：这是可选配置，当前项目不需要 Nginx 也能正常运行

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # 后端服务器组（可配置多个实现负载均衡）
    upstream tlias_backend {
        server 127.0.0.1:8080;
        # server 127.0.0.1:8081;  # 可添加更多后端实例
    }

    server {
        listen 80;
        server_name localhost;

        # 访问日志
        access_log logs/tlias_access.log;
        error_log logs/tlias_error.log;

        # 静态资源（如果前端单独部署）
        location /static/ {
            alias /path/to/your/static/files/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # API 接口反向代理
        location / {
            proxy_pass http://tlias_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 跨域配置（如果需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'token, Content-Type';

            # 处理 OPTIONS 预检请求
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS 配置示例（生产环境）
    # server {
    #     listen 443 ssl;
    #     server_name example.com;
    #
    #     ssl_certificate /path/to/cert.pem;
    #     ssl_certificate_key /path/to/key.pem;
    #
    #     location / {
    #         proxy_pass http://tlias_backend;
    #     }
    # }
}
