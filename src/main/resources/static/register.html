<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工注册 - Tlias 员工管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group label .required {
            color: #f56565;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #edf2f7;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .message.active {
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #718096;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .info-box {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #2c5282;
        }

        .info-box ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .info-box li {
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .register-container {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🏢 员工注册</h1>
            <p>Tlias 员工管理系统</p>
        </div>

        <div class="info-box">
            <strong>📝 注册说明：</strong>
            <ul>
                <li>用户名和密码为必填项</li>
                <li>注册成功后默认为普通用户</li>
                <li>可以使用注册的账号登录系统</li>
            </ul>
        </div>

        <div id="message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>用户名 <span class="required">*</span></label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label>密码 <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="form-group">
                <label>确认密码 <span class="required">*</span></label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>

            <div class="form-group">
                <label>姓名 <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="请输入真实姓名" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>性别 <span class="required">*</span></label>
                    <select id="gender" name="gender" required>
                        <option value="">请选择</option>
                        <option value="1">男</option>
                        <option value="2">女</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>职位</label>
                    <select id="job" name="job">
                        <option value="">请选择</option>
                        <option value="1">班主任</option>
                        <option value="2">讲师</option>
                        <option value="3">学工主管</option>
                        <option value="4">教研主管</option>
                        <option value="5">咨询师</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>部门</label>
                <select id="deptId" name="deptId">
                    <option value="">请选择</option>
                </select>
            </div>

            <div class="form-group">
                <label>入职日期</label>
                <input type="date" id="entrydate" name="entrydate">
            </div>

            <button type="submit" class="btn btn-primary">立即注册</button>
            <button type="button" class="btn btn-secondary" onclick="goToLogin()">返回登录</button>
        </form>

        <div class="login-link">
            已有账号？<a href="/index.html">立即登录</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        // 页面加载时获取部门列表
        document.addEventListener('DOMContentLoaded', function() {
            loadDepts();
            // 设置默认入职日期为今天
            document.getElementById('entrydate').value = new Date().toISOString().split('T')[0];
        });

        // 加载部门列表
        async function loadDepts() {
            try {
                const response = await fetch(`${API_BASE}/depts`);
                const result = await response.json();
                
                if (result.code === 1) {
                    const select = document.getElementById('deptId');
                    result.data.forEach(dept => {
                        const option = document.createElement('option');
                        option.value = dept.id;
                        option.textContent = dept.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载部门列表失败', error);
            }
        }

        // 显示消息
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} active`;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }

        // 返回登录
        function goToLogin() {
            window.location.href = '/index.html';
        }

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 获取表单数据
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const name = document.getElementById('name').value.trim();
            const gender = document.getElementById('gender').value;
            const job = document.getElementById('job').value;
            const deptId = document.getElementById('deptId').value;
            const entrydate = document.getElementById('entrydate').value;

            // 验证
            if (!username || !password || !name || !gender) {
                showMessage('请填写所有必填项', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('用户名至少3个字符', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码至少6个字符', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            // 构建请求数据
            const data = {
                username: username,
                password: password,
                name: name,
                gender: parseInt(gender)
            };

            if (job) data.job = parseInt(job);
            if (deptId) data.deptId = parseInt(deptId);
            if (entrydate) data.entrydate = entrydate;

            try {
                showMessage('正在注册...', 'success');

                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.code === 1) {
                    showMessage('✅ 注册成功！3秒后跳转到登录页面...', 'success');
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 3000);
                } else {
                    showMessage('❌ ' + (result.msg || '注册失败'), 'error');
                }
            } catch (error) {
                showMessage('❌ 网络错误: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
